<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Lighting Up</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030305;
      height: 100vh;
      overflow: hidden;
      position: relative;
      font-family: 'Courier New', monospace;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 55px 55px;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
      z-index: 200;
    }

    /* SVG layer for lines */
    #lines-svg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Nodes layer */
    #nodes-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* Individual node */
    .node {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.4) forwards;
    }
    @keyframes popIn {
      0%   { transform: translate(-50%,-50%) scale(0); opacity: 0; }
      70%  { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
    }

    .node.cyan {
      width: 7px; height: 7px;
      background: #00ffcc;
      box-shadow: 0 0 10px #00ffcc, 0 0 22px rgba(0,255,204,0.4);
    }
    .node.purple {
      width: 6px; height: 6px;
      background: #b026ff;
      box-shadow: 0 0 10px #b026ff, 0 0 22px rgba(176,38,255,0.4);
    }
    .node.hub {
      width: 10px; height: 10px;
      background: #00ffcc;
      box-shadow: 0 0 16px #00ffcc, 0 0 35px rgba(0,255,204,0.6);
    }

    /* Pulse ring on established nodes */
    .node-pulse {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border: 1px solid;
      animation: nodePulse 2.5s ease-out infinite;
    }
    .node-pulse.cyan { border-color: rgba(0,255,204,0.5); }
    .node-pulse.purple { border-color: rgba(176,38,255,0.5); }

    @keyframes nodePulse {
      0%   { width: 8px; height: 8px; opacity: 0.7; }
      100% { width: 28px; height: 28px; opacity: 0; }
    }

    /* UI overlays */
    .ui-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 22px 28px;
    }

    .ui-title {
      color: rgba(0,255,204,0.9);
      font-size: 0.75rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0,255,204,0.5);
    }
    .ui-title small {
      display: block;
      font-size: 0.5rem;
      letter-spacing: 4px;
      color: rgba(0,255,204,0.35);
      margin-top: 4px;
    }

    .ui-counter {
      text-align: right;
    }
    .counter-label {
      font-size: 0.48rem;
      letter-spacing: 3px;
      color: rgba(0,255,204,0.35);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .counter-val {
      font-size: 1.6rem;
      color: #00ffcc;
      text-shadow: 0 0 16px rgba(0,255,204,0.6);
      line-height: 1;
    }
    .counter-val .sep { color: rgba(0,255,204,0.25); font-size: 1rem; }

    /* Progress bar */
    .progress-wrap {
      position: fixed;
      top: 80px;
      right: 28px;
      width: 160px;
      z-index: 100;
    }
    .progress-bg {
      height: 3px;
      background: rgba(0,255,204,0.08);
      border: 1px solid rgba(0,255,204,0.15);
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffcc, #b026ff);
      transition: width 0.3s ease;
    }

    /* Bottom legend */
    .ui-bottom {
      position: fixed;
      bottom: 22px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 32px;
      z-index: 100;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.55rem;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }
    .legend-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .legend-dot.cyan   { background: #00ffcc; box-shadow: 0 0 6px #00ffcc; }
    .legend-dot.purple { background: #b026ff; box-shadow: 0 0 6px #b026ff; }

    /* Status line */
    .status-line {
      position: fixed;
      bottom: 50px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.55rem;
      letter-spacing: 4px;
      color: rgba(0,255,204,0.35);
      text-transform: uppercase;
      z-index: 100;
      transition: all 0.5s ease;
    }

    /* COMPLETE state */
    .complete-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
      text-align: center;
      z-index: 150;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }
    .complete-banner.show { opacity: 1; }
    .complete-banner h2 {
      font-size: 1.4rem;
      letter-spacing: 8px;
      color: #00ffcc;
      text-shadow: 0 0 30px rgba(0,255,204,0.8);
      text-transform: uppercase;
    }
    .complete-banner p {
      font-size: 0.55rem;
      letter-spacing: 5px;
      color: rgba(0,255,204,0.45);
      margin-top: 10px;
    }

    /* Corner brackets */
    .bracket {
      position: fixed;
      width: 35px; height: 35px;
      border-color: rgba(0,255,204,0.2);
      border-style: solid;
      z-index: 100;
    }
    .bracket.tl { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
    .bracket.tr { top: 14px; right: 14px; border-width: 1px 1px 0 0; }
    .bracket.bl { bottom: 14px; left: 14px; border-width: 0 0 1px 1px; }
    .bracket.br { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>

  <svg id="lines-svg"></svg>
  <div id="nodes-layer"></div>

  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div class="ui-top">
    <div class="ui-title">
      FliteGrid
      <small>Decentralized Airspace Network</small>
    </div>
    <div class="ui-counter">
      <div class="counter-label">Nodes Online</div>
      <div class="counter-val">
        <span id="onlineCount">0</span>
        <span class="sep"> / </span>
        <span>150</span>
      </div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bg">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="status-line" id="statusLine">Initializing sensor network...</div>

  <div class="complete-banner" id="completeBanner">
    <h2>Network Online</h2>
    <p>All 150 nodes active &nbsp;·&nbsp; Full coverage achieved</p>
  </div>

  <div class="ui-bottom">
    <div class="legend-item">
      <div class="legend-dot cyan"></div>
      Sensor Node
    </div>
    <div class="legend-item">
      <div class="legend-dot purple"></div>
      Relay Node
    </div>
  </div>

  <script>
    const nodesLayer = document.getElementById('nodes-layer');
    const svg = document.getElementById('lines-svg');
    const onlineCountEl = document.getElementById('onlineCount');
    const progressFill = document.getElementById('progressFill');
    const statusLine = document.getElementById('statusLine');
    const completeBanner = document.getElementById('completeBanner');

    const TOTAL = 150;
    const spawnedNodes = []; // { x, y, el, type }
    let count = 0;

    const svgNS = 'http://www.w3.org/2000/svg';

    function dist(a, b) {
      return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
    }

    function drawLine(a, b, color) {
      const line = document.createElementNS(svgNS, 'line');
      line.setAttribute('x1', a.x + '%');
      line.setAttribute('y1', a.y + '%');
      line.setAttribute('x2', b.x + '%');
      line.setAttribute('y2', b.y + '%');
      line.setAttribute('stroke', color);
      line.setAttribute('stroke-width', '0.5');
      line.setAttribute('opacity', '0');
      svg.appendChild(line);

      // fade in
      requestAnimationFrame(() => {
        line.style.transition = 'opacity 1.2s ease';
        requestAnimationFrame(() => {
          line.style.opacity = '0.35';
        });
      });
    }

    function addPulse(node) {
      const pulse = document.createElement('div');
      pulse.className = `node-pulse ${node.type}`;
      pulse.style.left = node.x + 'vw';
      pulse.style.top = node.y + 'vh';
      pulse.style.animationDelay = (Math.random() * 2) + 's';
      nodesLayer.appendChild(pulse);
    }

    function spawnNode() {
      const type = Math.random() > 0.35 ? 'cyan' : 'purple';
      const isHub = Math.random() > 0.9;

      const x = Math.random() * 90 + 5;
      const y = Math.random() * 80 + 10;

      const el = document.createElement('div');
      el.className = `node ${isHub ? 'hub' : type}`;
      el.style.left = x + 'vw';
      el.style.top  = y + 'vh';
      el.style.animationDelay = '0s';
      nodesLayer.appendChild(el);

      const nodeData = { x, y, el, type };
      spawnedNodes.push(nodeData);

      // Add pulse ring after pop-in
      setTimeout(() => addPulse(nodeData), 500 + Math.random() * 800);

      // Draw connections to nearby nodes (after 40 nodes, start connecting)
      if (spawnedNodes.length > 25) {
        const candidates = spawnedNodes.slice(0, -1)
          .filter(n => dist(n, nodeData) < 25)
          .sort((a, b) => dist(a, nodeData) - dist(b, nodeData))
          .slice(0, 2);

        candidates.forEach(c => {
          const lineColor = (type === 'cyan' && c.type === 'cyan')
            ? 'rgba(0,255,204,0.6)'
            : type !== c.type
              ? 'rgba(150,100,255,0.5)'
              : 'rgba(176,38,255,0.6)';
          setTimeout(() => drawLine(nodeData, c, lineColor), 300 + Math.random() * 400);
        });
      }

      count++;
      onlineCountEl.textContent = count;
      progressFill.style.width = (count / TOTAL * 100) + '%';

      // Status messages
      if (count === 1)   statusLine.textContent = 'Sensor nodes coming online...';
      if (count === 30)  statusLine.textContent = 'Mesh routing established...';
      if (count === 60)  statusLine.textContent = 'Connecting relay nodes...';
      if (count === 90)  statusLine.textContent = 'Expanding coverage zones...';
      if (count === 120) statusLine.textContent = 'Finalizing network topology...';
      if (count === 150) {
        statusLine.textContent = 'Network coverage: 100%';
        setTimeout(() => {
          completeBanner.classList.add('show');
        }, 600);
      }
    }

    // Spawn interval: start fast, stay consistent
    let spawned = 0;
    const interval = setInterval(() => {
      spawnNode();
      spawned++;
      if (spawned >= TOTAL) clearInterval(interval);
    }, 130);
  </script>
</body>
</html>
